# H2 内嵌数据库配置（开发测试用）
spring.datasource.url=jdbc:h2:file:./data/library_management;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jackson.time-zone=Asia/Shanghai

app.borrow.default-days=30
app.borrow.max-count=5
app.borrow.overdue-daily-fee=1.0
app.borrow.overdue-scan-cron=${OVERDUE_SCAN_CRON:0 0 3 * * ?}
app.auth.jwt-secret=${JWT_SECRET:library-management-system-jwt-secret-key-please-change}
app.auth.access-token-expire-minutes=${ACCESS_TOKEN_EXPIRE_MINUTES:120}
app.auth.refresh-token-expire-hours=${REFRESH_TOKEN_EXPIRE_HOURS:168}

logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.lms=${LOG_LEVEL_APP:INFO}
logging.pattern.console=${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}

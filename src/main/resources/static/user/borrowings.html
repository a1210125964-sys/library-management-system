<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 当前借阅</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
<div class="site-shell">
    <div class="container">
        <header class="site-header glass-card">
            <a class="site-logo" href="/home.html">LMS Portal</a>
            <nav class="site-nav" aria-label="门户导航">
                <a href="/home.html">首页</a>
                <a href="/catalog.html">馆藏</a>
                <a href="/news.html">公告</a>
                <a href="/about.html">关于</a>
                <a href="/user/dashboard.html">用户中心</a>
            </nav>
            <div class="site-auth">
                <a href="/login.html">切换账号</a>
                <a id="userLogoutBtn" href="#">退出登录</a>
            </div>
        </header>

        <main>
            <section class="hero glass-card page-hero slim-hero">
                <span class="hero-chip">当前借阅</span>
                <h1><span id="userDisplayName">读者</span> 的借阅清单</h1>
                <p class="page-subtitle">这里将展示在借图书、到期时间与续借入口（下一任务接入完整业务数据）。</p>
                <nav class="toolbar-row" aria-label="用户中心页面">
                    <a class="btn btn-ghost" href="/user/dashboard.html">总览</a>
                    <a class="btn btn-primary" href="/user/borrowings.html">当前借阅</a>
                    <a class="btn btn-ghost" href="/user/history.html">借阅历史</a>
                    <a class="btn btn-ghost" href="/user/profile.html">个人资料</a>
                    <a class="btn btn-ghost" href="/user/fines.html">罚款记录</a>
                </nav>
            </section>

            <section>
                <div class="glass-card panel-card">
                    <div class="section-head">
                        <h2 class="section-title">在借图书</h2>
                        <div class="toolbar-row">
                            <button id="borrowingsReloadBtn" class="btn btn-ghost btn-animated" type="button">刷新</button>
                            <input id="borrowingsKeyword" type="text" placeholder="关键词筛选书名" />
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table class="site-table">
                            <thead>
                            <tr>
                                <th>记录ID</th><th>书名</th><th>借阅时间</th><th>应还时间</th><th>状态</th><th>逾期费</th><th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="borrowingsTableBody"></tbody>
                        </table>
                    </div>
                    <div id="borrowingsEmpty" class="empty-state hidden">当前无在借图书。</div>
                </div>
            </section>

            <section>
                <div class="glass-card panel-card">
                    <div class="section-head">
                        <h2 class="section-title">可借图书</h2>
                        <div class="toolbar-row">
                            <button id="inventoryReloadBtn" class="btn btn-ghost btn-animated" type="button">刷新</button>
                            <input id="inventoryKeyword" type="text" placeholder="关键词检索书名 / 作者" />
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table class="site-table">
                            <thead>
                            <tr>
                                <th>图书ID</th><th>书名</th><th>作者</th><th>分类</th><th>可借库存</th><th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="inventoryTableBody"></tbody>
                        </table>
                    </div>
                    <div class="toolbar-row" style="justify-content: space-between; margin-top: 12px;">
                        <button id="inventoryPrevBtn" class="btn btn-ghost" type="button">上一页</button>
                        <span id="inventoryPageInfo" class="meta-text">第 1 / 1 页</span>
                        <button id="inventoryNextBtn" class="btn btn-ghost" type="button">下一页</button>
                    </div>
                    <div id="inventoryEmpty" class="empty-state hidden">暂无可借图书。</div>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>© <span id="currentYear"></span> 图书管理系统（LMS） · User Portal</p>
        </footer>
    </div>
</div>

<div id="dueTimeModal" class="due-time-modal hidden" role="dialog" aria-modal="true" aria-labelledby="dueTimeModalTitle">
    <div class="due-time-modal-card glass-card">
        <h3 id="dueTimeModalTitle">请选择应还时间</h3>
        <p id="dueTimeModalTip" class="meta-text">借书应还时间不能超过 1 个月</p>
        <input id="dueTimeInput" type="datetime-local" />
        <div class="toolbar-row">
            <button id="dueTimeConfirmBtn" class="btn btn-primary btn-animated" type="button">确认</button>
            <button id="dueTimeCancelBtn" class="btn btn-ghost" type="button">取消</button>
        </div>
    </div>
</div>

<script src="/js/core/http.js"></script>
<script src="/js/site-shell.js"></script>
<script src="/js/api/user-api.js"></script>
<script src="/js/ui/table.js"></script>
<script src="/js/ui/filters.js"></script>
<script src="/js/pages/user-dashboard.js"></script>
</body>
</html>

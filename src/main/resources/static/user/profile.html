<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 个人资料</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
<div class="site-shell">
    <div class="container">
        <header class="site-header glass-card">
            <a class="site-logo" href="/home.html">LMS Portal</a>
            <nav class="site-nav" aria-label="门户导航">
                <a href="/home.html">首页</a>
                <a href="/catalog.html">馆藏</a>
                <a href="/news.html">公告</a>
                <a href="/about.html">关于</a>
                <a href="/user/dashboard.html">用户中心</a>
            </nav>
            <div class="site-auth">
                <a href="/login.html">切换账号</a>
                <a id="userLogoutBtn" href="#">退出登录</a>
            </div>
        </header>

        <main>
            <section class="hero glass-card page-hero slim-hero">
                <span class="hero-chip">个人资料</span>
                <h1>账号与联系方式</h1>
                <p class="page-subtitle">用于展示并维护个人信息（后续任务接入资料编辑）。</p>
                <nav class="toolbar-row" aria-label="用户中心页面">
                    <a class="btn btn-ghost" href="/user/dashboard.html">总览</a>
                    <a class="btn btn-ghost" href="/user/borrowings.html">当前借阅</a>
                    <a class="btn btn-ghost" href="/user/history.html">借阅历史</a>
                    <a class="btn btn-primary" href="/user/profile.html">个人资料</a>
                    <a class="btn btn-ghost" href="/user/fines.html">罚款记录</a>
                </nav>
            </section>

            <section>
                <div class="glass-card panel-card">
                    <div class="section-head">
                        <h2 class="section-title">个人资料</h2>
                        <button id="profileReloadBtn" class="btn btn-ghost" type="button">重载</button>
                    </div>
                    <form id="profileForm" class="site-form" novalidate>
                        <div class="form-grid">
                            <div>
                                <label for="profileUsername">用户名</label>
                                <input id="profileUsername" type="text" disabled />
                            </div>
                            <div>
                                <label for="profileRealName">真实姓名</label>
                                <input id="profileRealName" type="text" required />
                            </div>
                            <div>
                                <label for="profilePhone">手机号</label>
                                <input id="profilePhone" type="text" required />
                            </div>
                            <div>
                                <label for="profileIdCard">身份证号</label>
                                <input id="profileIdCard" type="text" required />
                            </div>
                        </div>
                        <div class="toolbar-row">
                            <button id="profileSubmitBtn" class="btn btn-primary" type="submit">保存资料</button>
                        </div>
                    </form>
                    <div id="profileHint" class="empty-state hidden"></div>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>© <span id="currentYear"></span> 图书管理系统（LMS） · User Portal</p>
        </footer>
    </div>
</div>

<script src="/js/core/http.js"></script>
<script src="/js/site-shell.js"></script>
<script src="/js/api/user-api.js"></script>
<script src="/js/pages/user-dashboard.js"></script>
</body>
</html>

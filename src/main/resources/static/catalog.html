<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 馆藏目录</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
<div class="site-shell">
    <div class="container">
        <header class="site-header glass-card">
            <a class="site-logo" href="/home.html">LMS Portal</a>
            <nav class="site-nav" aria-label="门户导航">
                <a href="/home.html">首页</a>
                <a href="/catalog.html">馆藏</a>
                <a href="/news.html">公告</a>
                <a href="/about.html">关于</a>
            </nav>
            <div class="site-auth">
                <a href="/login.html">登录</a>
                <a class="btn-link" href="/register.html">注册</a>
            </div>
        </header>

        <main>
            <section class="hero glass-card page-hero">
                <span class="hero-chip">馆藏检索</span>
                <h1>面向公众开放的图书目录</h1>
                <p class="page-subtitle">支持关键词检索与分页浏览，实时读取公共馆藏接口。</p>
                <form id="catalogSearchForm" class="toolbar-row" autocomplete="off">
                    <input id="catalogKeyword" class="search-input" type="search" placeholder="输入书名 / 作者 / ISBN / 分类" />
                    <button class="btn btn-primary" type="submit">搜索</button>
                    <button id="catalogResetBtn" class="btn btn-ghost" type="button">重置</button>
                </form>
            </section>

            <section>
                <div class="section-head">
                    <h2 class="section-title">馆藏列表</h2>
                    <span id="catalogPageInfo" class="muted-text">加载中...</span>
                </div>
                <div id="catalogList" class="card-grid"></div>
                <div id="catalogEmpty" class="empty-state glass-card hidden">暂无符合条件的图书</div>
                <div class="pager-row">
                    <button id="catalogPrevBtn" class="btn btn-ghost" type="button">上一页</button>
                    <button id="catalogNextBtn" class="btn btn-ghost" type="button">下一页</button>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>© <span id="currentYear"></span> 图书管理系统（LMS） · Public Portal</p>
        </footer>
    </div>
</div>

<script src="/js/core/http.js"></script>
<script src="/js/site-shell.js"></script>
<script src="/js/pages/catalog.js"></script>
</body>
</html>

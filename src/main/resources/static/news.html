<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 公告中心</title>
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body>
<div class="site-shell">
    <div class="container">
        <header class="site-header glass-card">
            <a class="site-logo" href="/home.html">LMS Portal</a>
            <nav class="site-nav" aria-label="门户导航">
                <a href="/home.html">首页</a>
                <a href="/catalog.html">馆藏</a>
                <a href="/news.html">公告</a>
                <a href="/about.html">关于</a>
                <a href="/login.html" data-user-center-link="true">用户中心</a>
            </nav>
            <div class="site-auth">
                <a href="/login.html">登录</a>
                <a class="btn-link" href="/register.html">注册</a>
            </div>
        </header>

        <main>
            <section class="hero glass-card page-hero">
                <span class="hero-chip">公告中心</span>
                <h1>图书馆通知与活动信息</h1>
                <p class="page-subtitle">集中发布开馆通知、维护公告与阅读活动，支持详情跳转。</p>
            </section>

            <section>
                <div class="section-head">
                    <h2 class="section-title">最新公告</h2>
                    <span id="newsPageInfo" class="muted-text">加载中...</span>
                </div>
                <div id="noticeList" class="notice-list"></div>
                <div id="newsEmpty" class="empty-state glass-card hidden">当前暂无已发布公告</div>
                <div class="pager-row">
                    <button id="newsPrevBtn" class="btn btn-ghost" type="button">上一页</button>
                    <button id="newsNextBtn" class="btn btn-ghost" type="button">下一页</button>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>© <span id="currentYear"></span> 图书管理系统（LMS） · Public Portal</p>
        </footer>
    </div>
</div>

<script src="/js/core/http.js"></script>
<script src="/js/site-shell.js"></script>
<script src="/js/pages/news.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 借阅记录</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-dot"></div>
            <div>
                <h1>图书管理系统</h1>
                <p>Admin Console</p>
            </div>
        </div>
        <nav class="nav-menu" aria-label="管理后台导航">
            <a class="nav-item" href="index.html"><span class="nav-ico">📊</span><span>后台仪表盘</span></a>
            <a class="nav-item" href="books.html"><span class="nav-ico">📚</span><span>图书管理</span></a>
            <a class="nav-item" href="users.html"><span class="nav-ico">👥</span><span>用户管理</span></a>
            <a class="nav-item active" href="records.html"><span class="nav-ico">🧾</span><span>借阅记录</span></a>
            <a class="nav-item" href="logs.html"><span class="nav-ico">📜</span><span>系统日志</span></a>
            <a class="nav-item" href="notices.html"><span class="nav-ico">📢</span><span>公告管理</span></a>
        </nav>
        <div class="sidebar-foot">
            <span class="role-tag">管理员模式</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar glass-card">
            <div>
                <h2>借阅记录</h2>
                <p class="muted">首页 &gt; 借阅记录</p>
            </div>
            <div class="topbar-actions">
                <span id="adminUserInfo" class="pill">管理员</span>
                <button id="logoutBtn" class="btn btn-danger" type="button">退出登录</button>
            </div>
        </header>

        <section class="glass-card panel">
            <div class="panel-head">
                <h3>借阅记录模块</h3>
                <button id="recordsReloadBtn" class="btn btn-secondary" type="button">刷新</button>
            </div>
            <div class="row compact" style="margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
                <select id="recordsStatusFilter" class="inline-field" style="max-width: 180px;">
                    <option value="">全部状态</option>
                    <option value="BORROWED">借阅中</option>
                    <option value="OVERDUE">已逾期</option>
                    <option value="RETURNED">已归还</option>
                </select>
                <input id="recordsKeyword" class="inline-field" placeholder="用户名/姓名/书名关键词" />
                <button id="recordsSearchBtn" class="btn btn-secondary" type="button">查询</button>
                <button id="recordsResetBtn" class="btn btn-secondary" type="button">重置</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th><th>用户</th><th>图书</th><th>借阅时间</th><th>应还时间</th><th>归还时间</th><th>状态</th><th>续借次数</th><th>逾期费</th>
                    </tr>
                    </thead>
                    <tbody id="recordTable"></tbody>
                </table>
            </div>
            <div class="row compact" style="margin-top: 10px; display: flex; gap: 10px; align-items: center;">
                <button id="recordsPrevPage" class="btn btn-secondary" type="button">上一页</button>
                <span id="recordsPageInfo" class="muted">第 1 / 1 页</span>
                <button id="recordsNextPage" class="btn btn-secondary" type="button">下一页</button>
            </div>
        </section>
    </main>
</div>

<div id="toast" aria-live="polite"></div>
<script src="../js/core/http.js"></script>
<script src="../js/ui/toast.js"></script>
<script src="../js/core/guards.js"></script>
<script src="../js/core/pagination.js"></script>
<script src="../js/ui/states.js"></script>
<script src="../js/api/admin-api.js"></script>
<script src="../js/pages/admin-records.js"></script>
</body>
</html>

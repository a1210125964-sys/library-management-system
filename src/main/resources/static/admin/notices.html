<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 公告管理</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-dot"></div>
            <div>
                <h1>图书管理系统</h1>
                <p>Admin Console</p>
            </div>
        </div>
        <nav class="nav-menu" aria-label="管理后台导航">
            <a class="nav-item" href="index.html"><span class="nav-ico">📊</span><span>后台仪表盘</span></a>
            <a class="nav-item" href="books.html"><span class="nav-ico">📚</span><span>图书管理</span></a>
            <a class="nav-item" href="users.html"><span class="nav-ico">👥</span><span>用户管理</span></a>
            <a class="nav-item" href="records.html"><span class="nav-ico">🧾</span><span>借阅记录</span></a>
            <a class="nav-item" href="logs.html"><span class="nav-ico">📜</span><span>系统日志</span></a>
            <a class="nav-item active" href="notices.html"><span class="nav-ico">📢</span><span>公告管理</span></a>
            <a class="nav-item" href="../index.html?legacy=1"><span class="nav-ico">🧭</span><span>旧版后台（兼容入口）</span></a>
        </nav>
        <div class="sidebar-foot">
            <span class="role-tag">管理员模式</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar glass-card">
            <div>
                <h2>公告管理</h2>
                <p class="muted">首页 &gt; 公告管理</p>
            </div>
            <div class="topbar-actions">
                <span id="adminUserInfo" class="pill">管理员</span>
                <button id="logoutBtn" class="btn btn-danger" type="button">退出登录</button>
            </div>
        </header>

        <section class="glass-card panel">
            <div class="panel-head">
                <h3 id="noticeFormTitle">新建公告</h3>
                <div class="row compact">
                    <button id="noticeSubmitBtn" class="btn" type="button">保存公告</button>
                    <button id="noticeCancelEditBtn" class="btn btn-secondary hidden" type="button">取消编辑</button>
                </div>
            </div>
            <div class="floating-grid two-cols">
                <div class="field floating">
                    <input id="noticeTitle" placeholder=" " />
                    <label for="noticeTitle">标题</label>
                </div>
                <div class="field floating">
                    <input id="noticeSummary" placeholder=" " />
                    <label for="noticeSummary">摘要（可选）</label>
                </div>
                <div class="field" style="grid-column: 1 / -1;">
                    <textarea id="noticeContent" rows="6" style="width: 100%; border: 1px solid var(--line); border-radius: 10px; background: var(--surface-strong); padding: 12px; color: var(--text);"> </textarea>
                </div>
            </div>
            <label class="table-check">
                <input id="noticePublished" type="checkbox" /> 立即发布
            </label>
        </section>

        <section class="glass-card panel">
            <div class="panel-head">
                <h3>公告列表</h3>
                <button id="reloadNoticesBtn" class="btn btn-secondary" type="button">刷新列表</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th><th>标题</th><th>状态</th><th>发布时间</th><th>更新时间</th><th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="noticeTable"></tbody>
                </table>
            </div>
            <div class="row compact" style="margin-top: 10px;">
                <button id="noticePrevPage" class="btn btn-secondary" type="button">上一页</button>
                <span id="noticePageInfo" class="muted">第 1 / 1 页</span>
                <button id="noticeNextPage" class="btn btn-secondary" type="button">下一页</button>
            </div>
        </section>
    </main>
</div>

<div id="toast" aria-live="polite"></div>
<script src="../js/core/http.js"></script>
<script src="../js/ui/toast.js"></script>
<script src="../js/core/guards.js"></script>
<script src="../js/core/pagination.js"></script>
<script src="../js/ui/states.js"></script>
<script src="../js/api/admin-api.js"></script>
<script src="../js/pages/admin-notices.js"></script>
</body>
</html>

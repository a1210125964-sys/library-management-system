<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-dot"></div>
            <div>
                <h1>图书管理系统</h1>
                <p>LMS Console</p>
            </div>
        </div>
        <nav class="nav-menu" id="navMenu">
            <button class="nav-item active user-only" data-page="borrowQuery" type="button"><span class="nav-ico">📖</span><span>借阅图书查询</span></button>
            <button class="nav-item user-only" data-page="returnBook" type="button"><span class="nav-ico">↩️</span><span>图书归还</span></button>

            <button class="nav-item admin-only" data-page="studentManage" type="button"><span class="nav-ico">🎓</span><span>学生信息管理</span></button>
            <button class="nav-item admin-only" data-page="bookManage" type="button"><span class="nav-ico">📚</span><span>图书管理</span></button>
            <button class="nav-item admin-only" data-page="bookQuery" type="button"><span class="nav-ico">🔍</span><span>图书查询</span></button>
            <button class="nav-item admin-only" data-page="addBook" type="button"><span class="nav-ico">➕</span><span>添加图书</span></button>
            <button class="nav-item admin-only" data-page="changePassword" type="button"><span class="nav-ico">🔐</span><span>修改密码</span></button>
            <button class="nav-item admin-only" data-page="addAdmin" type="button"><span class="nav-ico">👨‍💼</span><span>添加管理员</span></button>
        </nav>
        <div class="sidebar-foot">
            <span class="role-tag" id="roleTag">未登录</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar glass-card">
            <div>
                <h2 id="pageTitle">借阅图书查询</h2>
                <p class="muted">模块按钮与功能页面一一对应</p>
            </div>
            <div class="topbar-actions">
                <button id="themeToggle" class="icon-btn" type="button" title="切换主题" aria-label="切换深色和浅色模式">🌓</button>
                <button class="icon-btn" type="button" title="通知">
                    🔔
                    <span id="notifyBadge" class="badge">0</span>
                </button>
                <span id="userInfo" class="pill"></span>
                <button id="logoutBtn" class="btn btn-danger" type="button" onclick="logout()">退出登录</button>
            </div>
        </header>

        <section id="borrowQueryPage" class="page-section">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>借阅图书查询</h3>
                    <button class="btn btn-secondary" type="button" onclick="loadBorrowQueryRecords()">刷新记录</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>记录ID</th><th>书名</th><th>借阅时间</th><th>应还时间</th><th>状态</th><th>逾期费</th>
                        </tr>
                        </thead>
                        <tbody id="borrowQueryTable"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="returnBookPage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>图书归还</h3>
                    <button class="btn btn-secondary" type="button" onclick="loadReturnableRecords()">刷新待归还</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>记录ID</th><th>书名</th><th>借阅时间</th><th>应还时间</th><th>状态</th><th>逾期费</th><th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="returnBookTable"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="studentManagePage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>学生信息管理</h3>
                    <button class="btn btn-secondary" type="button" onclick="loadStudentUsers()">刷新学生列表</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th><th>用户名</th><th>姓名</th><th>联系方式</th><th>角色</th><th>创建时间</th><th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="studentTable"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="bookManagePage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>图书管理</h3>
                    <button class="btn btn-secondary" type="button" onclick="loadAdminBooks(); loadCategories();">刷新列表</button>
                </div>

                <div class="floating-grid">
                    <div class="field floating"><input id="bookTitle" placeholder=" " /><label for="bookTitle">书名</label></div>
                    <div class="field floating"><input id="bookAuthor" placeholder=" " /><label for="bookAuthor">作者</label></div>
                    <div class="field floating"><input id="bookPublisher" placeholder=" " /><label for="bookPublisher">出版社</label></div>
                    <div class="field floating"><input id="bookIsbn" placeholder=" " /><label for="bookIsbn">ISBN</label></div>
                    <div class="field"><select id="bookCategory"></select></div>
                    <div class="field floating"><input id="bookStock" type="number" min="0" placeholder=" " /><label for="bookStock">库存</label></div>
                </div>
                <div class="row">
                    <button class="btn" type="button" onclick="createOrUpdateBook()">保存图书</button>
                    <button class="btn btn-secondary" type="button" onclick="resetBookForm()">清空表单</button>
                </div>

                <div class="floating-grid two-cols">
                    <div class="field floating"><input id="categoryName" placeholder=" " /><label for="categoryName">分类名称</label></div>
                    <div class="field floating"><input id="categoryDescription" placeholder=" " /><label for="categoryDescription">分类说明</label></div>
                </div>
                <div class="row">
                    <button class="btn" type="button" onclick="createOrUpdateCategory()">保存分类</button>
                    <button class="btn btn-secondary" type="button" onclick="resetCategoryForm()">重置分类</button>
                </div>

                <div class="split-tables">
                    <div class="table-wrap">
                        <table>
                            <thead>
                            <tr>
                                <th>ID</th><th>书名</th><th>作者</th><th>ISBN</th><th>分类</th><th>库存</th><th>可借</th><th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="adminBookTable"></tbody>
                        </table>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                            <tr>
                                <th>ID</th><th>分类名称</th><th>说明</th><th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="categoryTable"></tbody>
                        </table>
                    </div>
                </div>
            </article>
        </section>

        <section id="bookQueryPage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>图书查询</h3>
                    <div class="row compact">
                        <div class="field floating inline-field">
                            <input id="keyword" placeholder=" " />
                            <label for="keyword">按书名 / 作者 / ISBN 搜索</label>
                        </div>
                        <select id="categoryFilter"></select>
                        <button class="btn" type="button" onclick="loadBooks()">查询</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th><th>书名</th><th>作者</th><th>ISBN</th><th>分类</th><th>库存</th><th>可借</th><th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="bookTable"></tbody>
                    </table>
                </div>
            </article>
        </section>

        <section id="addBookPage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>添加图书</h3>
                </div>
                <div class="floating-grid">
                    <div class="field floating"><input id="addBookTitle" placeholder=" " /><label for="addBookTitle">书名</label></div>
                    <div class="field floating"><input id="addBookAuthor" placeholder=" " /><label for="addBookAuthor">作者</label></div>
                    <div class="field floating"><input id="addBookPublisher" placeholder=" " /><label for="addBookPublisher">出版社</label></div>
                    <div class="field floating"><input id="addBookIsbn" placeholder=" " /><label for="addBookIsbn">ISBN</label></div>
                    <div class="field"><select id="addBookCategory"></select></div>
                    <div class="field floating"><input id="addBookStock" type="number" min="0" placeholder=" " /><label for="addBookStock">库存</label></div>
                </div>
                <div class="row">
                    <button class="btn" type="button" onclick="createBookFromAddPage()">提交新增</button>
                </div>
            </article>
        </section>

        <section id="changePasswordPage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>修改密码</h3>
                </div>
                <div class="floating-grid two-cols">
                    <div class="field floating"><input id="currentPassword" type="password" placeholder=" " /><label for="currentPassword">当前密码</label></div>
                    <div class="field floating"><input id="newPassword" type="password" placeholder=" " /><label for="newPassword">新密码</label></div>
                    <div class="field floating"><input id="confirmNewPassword" type="password" placeholder=" " /><label for="confirmNewPassword">确认新密码</label></div>
                </div>
                <div class="row">
                    <button class="btn" type="button" onclick="changeMyPassword()">提交修改</button>
                </div>
            </article>
        </section>

        <section id="addAdminPage" class="page-section hidden">
            <article class="glass-card panel">
                <div class="panel-head">
                    <h3>添加管理员</h3>
                    <button class="btn btn-secondary" type="button" onclick="loadAdminUsers()">刷新管理员列表</button>
                </div>
                <div class="floating-grid">
                    <div class="field floating"><input id="adminUsername" placeholder=" " /><label for="adminUsername">管理员用户名</label></div>
                    <div class="field floating"><input id="adminRealName" placeholder=" " /><label for="adminRealName">管理员姓名</label></div>
                    <div class="field floating"><input id="adminPhone" placeholder=" " /><label for="adminPhone">联系方式</label></div>
                    <div class="field floating"><input id="adminIdCard" placeholder=" " /><label for="adminIdCard">身份证号</label></div>
                    <div class="field floating"><input id="adminPassword" type="password" placeholder=" " /><label for="adminPassword">管理员密码</label></div>
                </div>
                <div class="row"><button class="btn" type="button" onclick="createAdmin()">创建管理员</button></div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th><th>用户名</th><th>姓名</th><th>联系方式</th><th>角色</th><th>创建时间</th>
                        </tr>
                        </thead>
                        <tbody id="adminUserTable"></tbody>
                    </table>
                </div>
            </article>
        </section>
    </main>
</div>

<div id="toast" aria-live="polite"></div>
<script src="/js/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 控制台</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<main class="container">
    <header class="topbar">
        <div>
            <h1>图书管理系统</h1>
            <p class="muted">Library Management Dashboard</p>
        </div>
        <div class="topbar-actions">
            <span id="userInfo" class="pill"></span>
            <button id="logoutBtn" class="btn btn-danger" onclick="logout()">退出登录</button>
        </div>
    </header>

    <section class="card" id="bookCard">
        <div class="card-title-row">
            <h2>图书查询</h2>
            <div class="row compact">
                <input id="keyword" placeholder="按书名 / 作者 / ISBN / 分类检索" />
                <button class="btn" onclick="loadBooks()">查询</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th><th>书名</th><th>作者</th><th>ISBN</th><th>库存</th><th>可借</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="bookTable"></tbody>
            </table>
        </div>
    </section>

    <section class="card" id="borrowCard">
        <div class="card-title-row">
            <h2>我的借阅</h2>
            <button class="btn btn-secondary" onclick="loadMyRecords()">刷新</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>记录ID</th><th>书名</th><th>借阅时间</th><th>应还时间</th><th>状态</th><th>逾期费</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="borrowTable"></tbody>
            </table>
        </div>
    </section>

    <section class="card hidden" id="adminCard">
        <div class="card-title-row">
            <h2>管理员面板</h2>
            <div class="row compact">
                <button class="btn" onclick="loadStats()">查看统计</button>
                <button class="btn btn-secondary" onclick="scanOverdue()">逾期扫描</button>
            </div>
        </div>
        <pre id="adminOutput"></pre>
    </section>
</main>

<div id="toast" aria-live="polite"></div>
<script src="/js/app.js"></script>
</body>
</html>

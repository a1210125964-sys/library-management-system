<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 注册</title>
    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<main class="auth-layout">
    <section class="brand-panel">
        <h1>图书管理系统</h1>
        <p>创建读者账号，接入统一图书借阅平台</p>
        <ul>
            <li>快速查询馆藏</li>
            <li>在线借阅、续借、归还</li>
            <li>借阅记录与逾期信息可追踪</li>
        </ul>
    </section>

    <section class="auth-card">
        <h2>注册账号</h2>
        <p class="muted">请填写基本信息</p>

        <div class="field">
            <input id="username" placeholder=" " autocomplete="username" />
            <label for="username">用户名（3~50 位）</label>
        </div>

        <div class="field">
            <input id="realName" placeholder=" " autocomplete="name" />
            <label for="realName">真实姓名</label>
        </div>

        <div class="field">
            <input id="phone" placeholder=" " autocomplete="tel" />
            <label for="phone">联系方式（11位手机号）</label>
        </div>

        <div class="field">
            <input id="idCard" placeholder=" " autocomplete="off" />
            <label for="idCard">身份证号</label>
        </div>

        <div class="field">
            <input id="password" type="password" placeholder=" " autocomplete="new-password" />
            <label for="password">密码（6位以上）</label>
        </div>

        <button class="btn" onclick="register()">注册</button>

        <p class="tip">已有账号？<a href="/login.html">返回登录</a></p>
    </section>
</main>

<div id="toast" aria-live="polite"></div>
<script src="/js/auth.js"></script>
</body>
</html>

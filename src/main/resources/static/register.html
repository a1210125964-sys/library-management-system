<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图书管理系统 - 注册</title>
    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<main class="auth-layout">
    <section class="brand-panel">
        <h1>图书管理系统</h1>
        <p>欢迎加入图书管理系统，创建你的借阅账号</p>
        <ul>
            <li>快速查询馆藏</li>
            <li>在线借阅与续借</li>
            <li>个人借阅记录可追踪</li>
        </ul>
    </section>

    <section class="auth-card">
        <h2>注册账号</h2>
        <p class="muted">请填写基本信息</p>

        <label for="username">用户名</label>
        <input id="username" placeholder="3~50 位" autocomplete="username" />

        <label for="realName">真实姓名</label>
        <input id="realName" placeholder="请输入真实姓名" autocomplete="name" />

        <label for="phone">联系方式</label>
        <input id="phone" placeholder="请输入手机号（11位）" autocomplete="tel" />

        <label for="idCard">身份证号</label>
        <input id="idCard" placeholder="请输入身份证号" autocomplete="off" />

        <label for="password">密码</label>
        <input id="password" type="password" placeholder="6 位以上" autocomplete="new-password" />

        <button class="btn" onclick="register()">注册</button>

        <p class="tip">已有账号？<a href="/login.html">返回登录</a></p>
    </section>
</main>

<div id="toast" aria-live="polite"></div>
<script src="/js/auth.js"></script>
</body>
</html>
